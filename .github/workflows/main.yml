name: Bot Rei dos Leads Cloud

on:
  repository_dispatch:
    types: [rodar-bot]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas duckduckgo-search

      - name: Executar Extrator de Leads
        run: |
          python extrator.py "${{ github.event.client_payload.nicho }}" "${{ github.event.client_payload.data }}" "${{ github.event.client_payload.cidade }}"

      - name: Salvar lista de leads no repositório
        run: |
          git config --global user.name "Robo-Rei-Dos-Leads"
          git config --global user.email "bot@reidosleads.com"
          git add leads_nuvem.csv
          git commit -m "Novos leads: ${{ github.event.client_payload.nicho }} em ${{ github.event.client_payload.cidade }}" || echo "Nenhuma mudanca"
          git push