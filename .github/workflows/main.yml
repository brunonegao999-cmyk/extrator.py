name: Bot Rei dos Leads Cloud

on:
  repository_dispatch:
    types: [rodar-bot] # Esse é o sinal que o seu site envia

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do seu repositório para a máquina da nuvem
      - name: Checkout do código
        uses: actions/checkout@v3

      # 2. Instala o Python na máquina do GitHub
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. Instala as bibliotecas necessárias (Pandas para criar o Excel/CSV)
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      # 4. Executa o robô passando os 3 filtros: Nicho, Data e Cidade
      - name: Executar Extrator de Leads
        run: |
          python extrator.py "${{ github.event.client_payload.nicho }}" "${{ github.event.client_payload.data }}" "${{ github.event.client_payload.cidade }}"

      # 5. Salva o arquivo gerado de volta no seu GitHub automaticamente
      - name: Salvar lista de leads no repositório
        run: |
          git config --global user.name "Robo-Rei-Dos-Leads"
          git config --global user.email "bot@reidosleads.com"
          git add leads_nuvem.csv
          git commit -m "Novos leads extraídos: ${{ github.event.client_payload.nicho }} em ${{ github.event.client_payload.cidade }}"
          git push