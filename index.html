<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rei dos Leads - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #25d366; --bg: #0f0f0f; --card: #1a1a1a; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 1100px; display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        .sidebar { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; height: fit-content; }
        .logo { color: var(--primary); font-size: 1.4rem; font-weight: bold; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #888; font-size: 0.8rem; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #252525; border: 1px solid #333; border-radius: 8px; color: white; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .main-content { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--primary); padding: 15px 10px; border-bottom: 2px solid #333; }
        td { padding: 12px 10px; border-bottom: 1px solid #252525; font-size: 0.9rem; }
        .wa-link { color: var(--primary); text-decoration: none; font-weight: bold; }
        #status { margin-top: 15px; font-size: 0.8rem; text-align: center; color: #888; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="logo"><i class="fas fa-crown"></i> REI DOS LEADS</div>
        
        <div class="input-group">
            <label>Nicho (O que buscar?)</label>
            <input type="text" id="nicho" placeholder="Ex: Oficina">
        </div>

        <div class="input-group">
            <label>Cidade</label>
            <input type="text" id="cidade" placeholder="Ex: Vila Velha">
        </div>

        <div class="input-group">
            <label>Abertas desde</label>
            <input type="date" id="data">
        </div>

        <button onclick="dispararBot()" id="btnAction" class="btn-main">DISPARAR ROBÔ</button>
        <div id="status"><i class="fas fa-spinner fa-spin"></i> Robô trabalhando na nuvem...</div>
    </div>

    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin:0;">Leads Extraídos</h3>
            <button onclick="carregarDados()" style="background: transparent; border: 1px solid #444; color: white; padding: 8px 15px; cursor: pointer; border-radius: 5px;">
                <i class="fas fa-sync-alt"></i> Atualizar
            </button>
        </div>

        <div style="max-height: 500px; overflow-y: auto;">
            <table>
                <thead>
                    <tr>
                        <th>EMPRESA</th>
                        <th>WHATSAPP</th>
                        <th>CNPJ</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    <tr><td colspan="3" style="text-align:center; padding: 40px; color: #555;">Nenhum lead carregado.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        token: "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",
        user: "brunonegao999-cmyk",
        repo: "extrator.py"
    };

    async function dispararBot() {
        const n = document.getElementById('nicho').value;
        const c = document.getElementById('cidade').value;
        const d = document.getElementById('data').value;
        const status = document.getElementById('status');

        if(!n || !c || !d) return alert("Preencha todos os campos!");

        status.style.display = "block";
        document.getElementById('btnAction').disabled = true;

        const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/dispatches`, {
            method: 'POST',
            headers: { 'Authorization': `token ${CONFIG.token}`, 'Accept': 'application/vnd.github.v3+json' },
            body: JSON.stringify({
                event_type: 'rodar-bot',
                client_payload: { nicho: n, cidade: c, data: d }
            })
        });

        if(res.ok) alert("🚀 Comando enviado! Aguarde 1 minuto e clique em Atualizar.");
    }

    async function carregarDados() {
        const tabela = document.getElementById('corpoTabela');
        const url = `https://raw.githubusercontent.com/${CONFIG.user}/${CONFIG.repo}/main/leads_nuvem.csv?t=${new Date().getTime()}`;

        try {
            const res = await fetch(url);
            if(!res.ok) throw new Error("Arquivo ainda não disponível.");
            const csv = await res.text();
            const linhas = csv.split('\n').slice(1);

            tabela.innerHTML = "";
            linhas.forEach(linha => {
                const col = linha.split(',');
                if(col.length < 3) return;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${col[0]}</td><td><a href="https://wa.me/${col[1]}" target="_blank" class="wa-link">${col[1]}</a></td><td>${col[2]}</td>`;
                tabela.appendChild(tr);
            });
            document.getElementById('status').style.display = "none";
            document.getElementById('btnAction').disabled = false;
        } catch (e) { alert("O robô ainda está processando. Tente novamente em alguns segundos."); }
    }
</script>
</body>
</html>
